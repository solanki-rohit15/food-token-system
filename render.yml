services:
  - type: web
    name: food-token-system
    runtime: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: BUNDLE_WITHOUT
        value: "development:test"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_LOG_TO_STDOUT
        value: "enabled"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      # Google OAuth — set these in Render Dashboard → Environment Variables
      # Without them, "Sign in with Google" will not work.
      # - key: GOOGLE_CLIENT_ID
      #   sync: false
      # - key: GOOGLE_CLIENT_SECRET
      #   sync: false
